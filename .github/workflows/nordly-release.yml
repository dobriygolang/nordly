name: nordly-release

on:
  push:
    tags:
      - 'nordly-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            os: macos
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            os: macos
          - platform: windows-latest
            args: ''
            os: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
          cache-dependency-path: apps/nordly/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/nordly/src-tauri -> target

      - name: Import Apple Developer certificate
        if: matrix.os == 'macos' && vars.NORDLY_CODE_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/nordly-signing.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/nordly-signing.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f /tmp/nordly-signing.p12

      - name: Prepare App Store Connect API key
        if: matrix.os == 'macos' && vars.NORDLY_CODE_SIGNING == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Import Windows code signing certificate
        if: matrix.os == 'windows' && vars.NORDLY_CODE_SIGNING == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          Remove-Item certificate/certificate.pfx
          Get-ChildItem Cert:\CurrentUser\My | Format-Table Subject, Thumbprint, NotAfter

      - name: Install frontend dependencies
        working-directory: apps/nordly
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_PROGRESS: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_FUND: 'false'
        run: |
          node --version
          npm --version
          npm ci --no-audit --no-fund --progress=false --registry https://registry.npmjs.org

      - name: Sync app version from release tag
        if: github.ref_type == 'tag'
        working-directory: apps/nordly
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [[ ! "$tag" =~ ^nordly-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be nordly-vMAJOR.MINOR.PATCH (e.g. nordly-v0.0.2)."
            echo "Got: $tag — tags like nordly-v0.0.1.1 do not change the app version seen by the updater."
            exit 1
          fi
          version="${tag#nordly-v}"
          export VERSION="$version"
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          if (!version) throw new Error('VERSION env is required');
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
          const cargoPath = 'src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          fs.writeFileSync(
            cargoPath,
            cargo.replace(/^version = ".*"/m, `version = "${version}"`),
          );
          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          console.log('Synced app version to', version);
          NODE

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version=$(node -p "require('./apps/nordly/src-tauri/tauri.conf.json').version")
            echo "tag=nordly-v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write ad-hoc macOS signing overlay
        if: matrix.os == 'macos'
        working-directory: apps/nordly
        shell: bash
        run: |
          if [[ "${{ vars.NORDLY_CODE_SIGNING }}" == "true" && -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            printf '%s\n' "{\"bundle\":{\"macOS\":{\"signingIdentity\":\"${{ secrets.APPLE_SIGNING_IDENTITY }}\"}}}" > src-tauri/signing.ci.json
          else
            printf '%s\n' '{"bundle":{"macOS":{"signingIdentity":"-"}}}' > src-tauri/signing.ci.json
          fi
          cat src-tauri/signing.ci.json

      - name: Resolve tauri build args
        id: tauri_args
        working-directory: apps/nordly
        shell: bash
        run: |
          args="${{ matrix.args }}"
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            args="$args --config src-tauri/signing.ci.json"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
          echo "tauri build args: $args"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_NORDLY_LOCAL_ONLY: 'false'
          VITE_NORDLY_WEB_BASE: 'https://trynordly.app'
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos' && (vars.NORDLY_CODE_SIGNING == 'true' && secrets.APPLE_SIGNING_IDENTITY || '-') || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos' && vars.NORDLY_CODE_SIGNING == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos' && vars.NORDLY_CODE_SIGNING == 'true' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.os == 'macos' && vars.NORDLY_CODE_SIGNING == 'true' && secrets.APPLE_API_KEY_ID || '' }}
        with:
          projectPath: apps/nordly
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: Nordly ${{ steps.release.outputs.tag }}
          releaseBody: |
            Signed desktop builds for macOS (Apple Silicon + Intel) and Windows.

            Installers are attached below. Installed apps can update from **Settings → Software → Check for Updates**.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ steps.tauri_args.outputs.args }}

  sync-cdn:
    name: sync desktop CDN
    needs: publish
    runs-on: ubuntu-latest
    if: success() && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version=$(node -p "require('./apps/nordly/src-tauri/tauri.conf.json').version")
            echo "name=nordly-v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/desktop-release
          gh release download "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/desktop-release
          ls -la /tmp/desktop-release

      - name: Prepare CDN bundle
        run: |
          set -euo pipefail
          node deploy/scripts/prepare-desktop-cdn.mjs \
            --input /tmp/desktop-release \
            --tag "${{ steps.tag.outputs.name }}" \
            --cdn-base https://trynordly.app/desktop \
            --output /tmp/cdn-upload
          tar czf /tmp/desktop-cdn.tgz -C /tmp/cdn-upload desktop

      - name: Upload CDN bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: /tmp/desktop-cdn.tgz
          target: /opt/project-nordly/
          overwrite: true

      - name: Install CDN bundle on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            REPO_DIR="/opt/project-nordly"
            if [ -n "${{ secrets.DEPLOY_REPO_DIR }}" ]; then REPO_DIR="${{ secrets.DEPLOY_REPO_DIR }}"; fi
            mkdir -p "$REPO_DIR/deploy/data/cdn"
            tar xzf "$REPO_DIR/desktop-cdn.tgz" -C "$REPO_DIR/deploy/data/cdn"
            rm -f "$REPO_DIR/desktop-cdn.tgz"
            test -f "$REPO_DIR/deploy/data/cdn/desktop/latest.json"
            test -f "$REPO_DIR/deploy/data/cdn/desktop/releases.json"
            echo "CDN desktop bundle installed for tag ${{ steps.tag.outputs.name }}"
