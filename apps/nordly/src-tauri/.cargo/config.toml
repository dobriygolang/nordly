[target.aarch64-apple-darwin]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift-5.5/macosx",
  "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift-5.5/macosx",
  "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]
