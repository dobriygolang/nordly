[[permission]]
identifier = "allow-nordly-main-commands"
description = "Nordly commands available only to the main window."
commands.allow = [
  "auth_session",
  "auth_persist",
  "auth_logout",
  "vault_pass_load",
  "vault_pass_save",
  "vault_pass_clear",
  "pomodoro_load",
  "pomodoro_save",
  "shell_open_external",
  "window_traffic_lights_show",
  "deep_link_initial",
  "read_text_file",
  "show_notification",
  "apple_calendar_auth_status",
  "apple_calendar_runtime_info",
  "apple_calendar_request_access",
  "apple_calendar_open_settings",
  "apple_calendar_open_event",
  "apple_calendar_get_event",
  "apple_calendar_list_calendars",
  "apple_calendar_list_events",
]

[[permission]]
identifier = "allow-nordly-tray-commands"
description = "Nordly commands available only to the tray popover."
commands.allow = [
  "pomodoro_load",
  "tray_show_main",
]

[[permission]]
identifier = "allow-nordly-notification-commands"
description = "Nordly commands available only to the notification window."
commands.allow = [
  "hide_notification",
  "focus_main_window",
]
