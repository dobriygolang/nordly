[[permission]]
identifier = "allow-nordly-commands"
description = "Nordly custom invoke handlers (auth, vault, pomodoro, shell)."
commands.allow = [
  "auth_session",
  "auth_persist",
  "auth_logout",
  "vault_pass_load",
  "vault_pass_save",
  "vault_pass_clear",
  "pomodoro_load",
  "pomodoro_save",
  "shell_open_external",
  "window_traffic_lights_show",
  "tray_show_main",
  "deep_link_initial",
  "show_notification",
  "hide_notification",
  "focus_main_window",
  "apple_calendar_auth_status",
  "apple_calendar_runtime_info",
  "apple_calendar_request_access",
  "apple_calendar_open_settings",
  "apple_calendar_list_calendars",
  "apple_calendar_list_events",
]
