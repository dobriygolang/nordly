syntax = "proto3";

package identity.v1;

option go_package = "github.com/dobriygolang/project-nordly/services/identity/pkg/api/identity/v1;identityv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service IdentityService {
  rpc AuthTelegram(AuthTelegramRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/telegram"
      body: "*"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
  }

  // s2s
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserByTelegramID(GetUserByTelegramIDRequest) returns (GetUserResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc MintScopedAccessToken(MintScopedAccessTokenRequest) returns (MintScopedAccessTokenResponse);
}

message User {
  string id = 1;
  string username = 2;
  string avatar_url = 3;
  google.protobuf.Timestamp created_at = 4;
  int64 telegram_id = 5;
  string timezone = 6;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message AuthTelegramRequest {
  string code = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByTelegramIDRequest {
  int64 telegram_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  bool valid = 2;
}

message MintScopedAccessTokenRequest {
  string role = 1;
  string scope = 2;
  string display_name = 3;
  int32 ttl_seconds = 4;
}

message MintScopedAccessTokenResponse {
  string access_token = 1;
  string user_id = 2;
  int32 expires_in = 3;
}
