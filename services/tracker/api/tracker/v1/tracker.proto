syntax = "proto3";

package tracker.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dobriygolang/project-nordly/services/tracker/pkg/api/tracker/v1;trackerv1";

service TrackerService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {
    option (google.api.http) = {get: "/v1/tracker/settings"};
  }

  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse) {
    option (google.api.http) = {
      patch: "/v1/tracker/settings"
      body: "*"
    };
  }

  rpc GetGoogleCalendarAuthURL(GetGoogleCalendarAuthURLRequest) returns (GetGoogleCalendarAuthURLResponse) {
    option (google.api.http) = {get: "/v1/tracker/integrations/google/url"};
  }

  rpc DisconnectGoogleCalendar(DisconnectGoogleCalendarRequest) returns (DisconnectGoogleCalendarResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/integrations/google/disconnect"
      body: "*"
    };
  }

  rpc ListGoogleCalendarEvents(ListGoogleCalendarEventsRequest) returns (ListGoogleCalendarEventsResponse) {
    option (google.api.http) = {get: "/v1/tracker/integrations/google/events"};
  }

  rpc CreateGoogleCalendarEvent(CreateGoogleCalendarEventRequest) returns (CreateGoogleCalendarEventResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/integrations/google/events"
      body: "*"
    };
  }

  rpc UpdateGoogleCalendarEvent(UpdateGoogleCalendarEventRequest) returns (UpdateGoogleCalendarEventResponse) {
    option (google.api.http) = {
      patch: "/v1/tracker/integrations/google/events/{id}"
      body: "*"
    };
  }

  rpc DeleteGoogleCalendarEvent(DeleteGoogleCalendarEventRequest) returns (DeleteGoogleCalendarEventResponse) {
    option (google.api.http) = {delete: "/v1/tracker/integrations/google/events/{id}"};
  }

  rpc ListGoogleCalendars(ListGoogleCalendarsRequest) returns (ListGoogleCalendarsResponse) {
    option (google.api.http) = {get: "/v1/tracker/integrations/google/calendars"};
  }

  rpc ListWorkTasks(ListWorkTasksRequest) returns (ListWorkTasksResponse) {
    option (google.api.http) = {get: "/v1/tracker/work/tasks"};
  }

  rpc CreateWorkTask(CreateWorkTaskRequest) returns (CreateWorkTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/work/tasks"
      body: "*"
    };
  }

  rpc UpdateWorkTaskStatus(UpdateWorkTaskStatusRequest) returns (UpdateWorkTaskStatusResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/work/tasks/{id}/status"
      body: "*"
    };
  }

  rpc DeleteWorkTask(DeleteWorkTaskRequest) returns (DeleteWorkTaskResponse) {
    option (google.api.http) = {delete: "/v1/tracker/work/tasks/{id}"};
  }

  rpc ScheduleWorkTask(ScheduleWorkTaskRequest) returns (ScheduleWorkTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/work/tasks/{id}/schedule"
      body: "*"
    };
  }

  rpc UnscheduleWorkTask(UnscheduleWorkTaskRequest) returns (UnscheduleWorkTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/work/tasks/{id}/unschedule"
      body: "*"
    };
  }

  rpc PatchWorkTask(PatchWorkTaskRequest) returns (PatchWorkTaskResponse) {
    option (google.api.http) = {
      patch: "/v1/tracker/work/tasks/{id}"
      body: "*"
    };
  }

  rpc CreateWorkTaskConference(CreateWorkTaskConferenceRequest) returns (CreateWorkTaskConferenceResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/work/tasks/{id}/conference"
      body: "*"
    };
  }

  rpc ListEpics(ListEpicsRequest) returns (ListEpicsResponse) {
    option (google.api.http) = {get: "/v1/tracker/work/epics"};
  }

  rpc GetZoomAuthURL(GetZoomAuthURLRequest) returns (GetZoomAuthURLResponse) {
    option (google.api.http) = {get: "/v1/tracker/integrations/zoom/url"};
  }

  rpc DisconnectZoom(DisconnectZoomRequest) returns (DisconnectZoomResponse) {
    option (google.api.http) = {
      post: "/v1/tracker/integrations/zoom/disconnect"
      body: "*"
    };
  }
}

message UserSettings {
  reserved 1;
  reserved "user_id";
  // Deprecated: task→Google mirroring removed; always false.
  bool google_calendar_sync_enabled = 2;
  bool google_calendar_connected = 3;
  // Set when the stored Google token was revoked/expired and the user must reconnect.
  bool google_reauth_required = 4;
  // Calendar used for Google Meet creation and inbound event sync (defaults to "primary").
  string google_calendar_id = 5;
  bool zoom_connected = 6;
  bool zoom_reauth_required = 7;
}

message GetSettingsRequest {}

message GetSettingsResponse {
  UserSettings settings = 1;
}

message UpdateSettingsRequest {
  reserved 2;
  reserved "google_calendar_sync_enabled";
  optional string google_calendar_id = 3;
}

message UpdateSettingsResponse {
  UserSettings settings = 1;
}

message GetGoogleCalendarAuthURLRequest {}

message GetGoogleCalendarAuthURLResponse {
  string url = 1;
}

message DisconnectGoogleCalendarRequest {}

message DisconnectGoogleCalendarResponse {
  UserSettings settings = 1;
}

message GetZoomAuthURLRequest {}

message GetZoomAuthURLResponse {
  string url = 1;
}

message DisconnectZoomRequest {}

message DisconnectZoomResponse {
  UserSettings settings = 1;
}

message ListGoogleCalendarEventsRequest {
  google.protobuf.Timestamp time_min = 1;
  google.protobuf.Timestamp time_max = 2;
}

message GoogleCalendarEvent {
  string id = 1;
  string title = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
  bool all_day = 5;
  string calendar_id = 6;
  string html_link = 7;
  bool editable = 8;
}

message ListGoogleCalendarEventsResponse {
  repeated GoogleCalendarEvent events = 1;
}

message CreateGoogleCalendarEventRequest {
  string title = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
  bool all_day = 4;
  string calendar_id = 5;
}

message CreateGoogleCalendarEventResponse {
  GoogleCalendarEvent event = 1;
}

message UpdateGoogleCalendarEventRequest {
  string id = 1;
  string title = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
  bool all_day = 5;
  string calendar_id = 6;
}

message UpdateGoogleCalendarEventResponse {
  GoogleCalendarEvent event = 1;
}

message DeleteGoogleCalendarEventRequest {
  string id = 1;
  string calendar_id = 2;
}

message DeleteGoogleCalendarEventResponse {}

message GoogleCalendarListEntry {
  string id = 1;
  string summary = 2;
  bool primary = 3;
  bool writable = 4;
  string background_color = 5;
}

message ListGoogleCalendarsRequest {}

message ListGoogleCalendarsResponse {
  repeated GoogleCalendarListEntry calendars = 1;
}

message Epic {
  string id = 1;
  string name = 2;
  string color = 3;
}

message ListEpicsRequest {}

message ListEpicsResponse {
  repeated Epic epics = 1;
}

message WorkTask {
  string id = 1;
  string status = 2;
  string kind = 3;
  string title = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  optional google.protobuf.Timestamp completed_at = 7;
  optional google.protobuf.Timestamp scheduled_start = 8;
  optional int32 scheduled_duration_min = 9;
  optional string google_event_id = 10;
  optional string epic_id = 11;
  optional string conference_url = 12;
  optional string conference_provider = 13;
}

message ListWorkTasksRequest {}

message ListWorkTasksResponse {
  repeated WorkTask tasks = 1;
}

message CreateWorkTaskRequest {
  string kind = 1;
  string title = 2;
}

message CreateWorkTaskResponse {
  WorkTask task = 1;
}

message UpdateWorkTaskStatusRequest {
  string id = 1;
  string status = 2;
}

message UpdateWorkTaskStatusResponse {
  WorkTask task = 1;
}

message DeleteWorkTaskRequest {
  string id = 1;
}

message DeleteWorkTaskResponse {}

message ScheduleWorkTaskRequest {
  string id = 1;
  string scheduled_start_iso = 2;
  int32 duration_min = 3;
}

message ScheduleWorkTaskResponse {
  WorkTask task = 1;
}

message UnscheduleWorkTaskRequest {
  string id = 1;
}

message UnscheduleWorkTaskResponse {
  WorkTask task = 1;
}

message PatchWorkTaskRequest {
  string id = 1;
  optional string epic_id = 2;
  optional bool clear_epic = 3;
  optional bool clear_conference = 4;
}

message PatchWorkTaskResponse {
  WorkTask task = 1;
}

message CreateWorkTaskConferenceRequest {
  string id = 1;
  // "meet" or "zoom"
  string provider = 2;
}

message CreateWorkTaskConferenceResponse {
  WorkTask task = 1;
}
